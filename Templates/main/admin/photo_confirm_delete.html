{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atelier Admin | Delete Piece</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: #f4f4f4;
      color: #333;
      margin: 0;
      padding: 10vh 2rem;
      display: flex;
      justify-content: center;
    }
    h2 { font-family: 'Playfair Display', serif; font-weight: 400; color: #d9534f; }

    .delete-wrapper {
      background: #FFFFFF;
      padding: 3rem;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    .warning-text {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
      margin: 2rem 0;
    }

    /* Button Styling */
    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-danger {
      flex: 1;
      background: #d9534f;
      color: white;
      padding: 1rem;
      text-decoration: none;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    .btn-danger:hover { background: #c9302c; }

    .btn-cancel {
      flex: 1;
      background: #f4f4f4;
      color: #333;
      padding: 1rem;
      text-decoration: none;
      border-radius: 4px;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: background 0.3s ease;
    }

    .btn-cancel:hover { background: #e0e0e0; }
  </style>
</head>
<body>

  <div class="delete-wrapper">
    <h2>Remove from Archive?</h2>

    <p class="warning-text">
      Are you sure you want to permanently delete the couture piece <strong>"{{ photo.title }}"</strong>?
      <br><br>
      <span style="font-size: 0.9rem; color: #999;">This action cannot be undone and will permanently remove all associated imagery and cuts.</span>
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="btn-group">
        <a href="{% url 'dashboard' %}" class="btn-cancel">Keep It</a>
        <button type="submit" class="btn-danger">Yes, Delete</button>
      </div>
    </form>
  </div>

</body>
</html>
